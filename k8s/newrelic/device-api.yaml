---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-api
  namespace: demo-newrelic
  labels:
    app: device-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: device-api
  template:
    metadata:
      labels:
        app: device-api
        environment: demo-newrelic
      annotations:
        instrumentation.newrelic.com/inject-python: "newrelic"
    spec:
      serviceAccountName: newrelic-app-sa
      nodeSelector:
        node-type: ec2
      containers:
        - name: device-api
          image: ${ECR_REGISTRY}/obs-poc/device-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "device-api"
            - name: ENVIRONMENT
              value: "demo-newrelic"
            - name: NEW_RELIC_APP_NAME
              value: "device-api (demo-newrelic)"
            - name: NEW_RELIC_DISTRIBUTED_TRACING_ENABLED
              value: "true"
            - name: METRICS_COLLECTOR_URL
              value: "http://metrics-collector:8000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: device-api-db
                  key: DATABASE_URL
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: device-api
  namespace: demo-newrelic
  labels:
    app: device-api
spec:
  type: ClusterIP
  selector:
    app: device-api
  ports:
    - port: 8000
      targetPort: 8000
      name: http
