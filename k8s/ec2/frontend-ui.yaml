---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-ui
  namespace: demo-ec2
  labels:
    app: frontend-ui
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-ui
  template:
    metadata:
      labels:
        app: frontend-ui
        version: v1
        environment: demo-ec2
      annotations:
        # Application Signals: inject OpenTelemetry Python agent
        instrumentation.opentelemetry.io/inject-python: "true"
        # CloudWatch Container Insights
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: app-signals-sa
      # Schedule on EC2 nodes only
      nodeSelector:
        node-type: ec2
      containers:
        - name: frontend-ui
          image: ${ECR_REGISTRY}/obs-poc/frontend-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "frontend-ui"
            - name: ENVIRONMENT
              value: "demo-ec2"
            - name: NODE_TYPE
              value: "EC2"
            - name: BFF_URL
              value: "http://backend-for-frontend:8000"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://cloudwatch-agent.amazon-cloudwatch:4317"
            - name: OTEL_SERVICE_NAME
              value: "frontend-ui"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=demo-ec2,k8s.namespace.name=demo-ec2"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-ui
  namespace: demo-ec2
  labels:
    app: frontend-ui
spec:
  type: LoadBalancer
  selector:
    app: frontend-ui
  ports:
    - port: 80
      targetPort: 8000
      name: http
