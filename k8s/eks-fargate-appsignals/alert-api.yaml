---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-api
  namespace: eks-fargate-appsignals
  labels:
    app: alert-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-api
  template:
    metadata:
      labels:
        app: alert-api
        environment: eks-fargate-appsignals
      annotations:
        instrumentation.opentelemetry.io/inject-python: "appsignals-fargate"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: app-signals-sa
      containers:
        - name: alert-api
          image: ${ECR_REGISTRY}/obs-poc/alert-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "alert-api"
            - name: ENVIRONMENT
              value: "eks-fargate-appsignals"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://adot-collector:4316"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_SERVICE_NAME
              value: "alert-api"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=eks-fargate-appsignals,k8s.namespace.name=eks-fargate-appsignals"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: alert-api
  namespace: eks-fargate-appsignals
  labels:
    app: alert-api
spec:
  type: ClusterIP
  selector:
    app: alert-api
  ports:
    - port: 8000
      targetPort: 8000
      name: http
