---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netwatch-ui
  namespace: eks-fargate-newrelic
  labels:
    app: netwatch-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netwatch-ui
  template:
    metadata:
      labels:
        app: netwatch-ui
        environment: eks-fargate-newrelic
      annotations:
        # NR Python APM agent injection — works on Fargate (APM traces only)
        # NOTE: Infrastructure Agent (DaemonSet) is not available on Fargate.
        #       Infra metrics and NR Logs Fluent Bit are not collected in this environment.
        instrumentation.newrelic.com/inject-python: "newrelic-fargate"
    spec:
      serviceAccountName: newrelic-fargate-sa
      containers:
        - name: netwatch-ui
          image: ${ECR_REGISTRY}/obs-poc/netwatch-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "netwatch-ui"
            - name: ENVIRONMENT
              value: "eks-fargate-newrelic"
            - name: NODE_TYPE
              value: "EKS on Fargate"
            - name: DEVICE_API_URL
              value: "http://device-api:8000"
            - name: ALERT_API_URL
              value: "http://alert-api:8000"
            - name: NEW_RELIC_APP_NAME
              value: "netwatch-ui (eks-fargate-newrelic)"
            - name: NEW_RELIC_DISTRIBUTED_TRACING_ENABLED
              value: "true"
            - name: NR_BROWSER_SNIPPET
              valueFrom:
                secretKeyRef:
                  name: newrelic-secret
                  key: browser-snippet
                  optional: true
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: netwatch-ui
  namespace: eks-fargate-newrelic
  labels:
    app: netwatch-ui
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "60"
spec:
  type: LoadBalancer
  selector:
    app: netwatch-ui
  ports:
    - port: 80
      targetPort: 8000
      name: http
