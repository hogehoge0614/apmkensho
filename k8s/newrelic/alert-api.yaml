---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-api
  namespace: demo-newrelic
  labels:
    app: alert-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-api
  template:
    metadata:
      labels:
        app: alert-api
        environment: demo-newrelic
      annotations:
        instrumentation.newrelic.com/inject-python: "newrelic"
    spec:
      serviceAccountName: newrelic-app-sa
      nodeSelector:
        node-type: ec2
      containers:
        - name: alert-api
          image: ${ECR_REGISTRY}/obs-poc/alert-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "alert-api"
            - name: ENVIRONMENT
              value: "demo-newrelic"
            - name: NEW_RELIC_APP_NAME
              value: "alert-api (demo-newrelic)"
            - name: NEW_RELIC_DISTRIBUTED_TRACING_ENABLED
              value: "true"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: alert-api
  namespace: demo-newrelic
  labels:
    app: alert-api
spec:
  type: ClusterIP
  selector:
    app: alert-api
  ports:
    - port: 8000
      targetPort: 8000
      name: http
