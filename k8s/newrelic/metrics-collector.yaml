---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-collector
  namespace: demo-newrelic
  labels:
    app: metrics-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-collector
  template:
    metadata:
      labels:
        app: metrics-collector
        environment: demo-newrelic
      annotations:
        instrumentation.newrelic.com/inject-python: "newrelic"
    spec:
      serviceAccountName: newrelic-app-sa
      nodeSelector:
        node-type: ec2
      containers:
        - name: metrics-collector
          image: ${ECR_REGISTRY}/obs-poc/metrics-collector:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "metrics-collector"
            - name: ENVIRONMENT
              value: "demo-newrelic"
            - name: NEW_RELIC_APP_NAME
              value: "metrics-collector (demo-newrelic)"
            - name: NEW_RELIC_DISTRIBUTED_TRACING_ENABLED
              value: "true"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-collector
  namespace: demo-newrelic
  labels:
    app: metrics-collector
spec:
  type: ClusterIP
  selector:
    app: metrics-collector
  ports:
    - port: 8000
      targetPort: 8000
      name: http
