---
# CloudWatch Agent for Fargate — Deployment mode (DaemonSet not supported on Fargate)
# The AmazonCloudWatchAgent CR (cloudwatch.aws.amazon.com/v1alpha1) with mode=deployment
# lets the CW Observability Operator create a Deployment + Service in this namespace.
# App pods send OTLP to adot-collector:4316 (Service created by the operator).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: adot-collector-sa
  namespace: eks-fargate-appsignals
  annotations:
    eks.amazonaws.com/role-arn: "${APP_SIGNALS_FARGATE_ROLE_ARN}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eks-fargate-appsignals-adot-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "endpoints", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eks-fargate-appsignals-adot-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eks-fargate-appsignals-adot-collector
subjects:
  - kind: ServiceAccount
    name: adot-collector-sa
    namespace: eks-fargate-appsignals
---
apiVersion: cloudwatch.aws.amazon.com/v1alpha1
kind: AmazonCloudWatchAgent
metadata:
  name: adot-collector
  namespace: eks-fargate-appsignals
spec:
  mode: deployment
  replicas: 1
  serviceAccount: adot-collector-sa
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "false"
    instrumentation.opentelemetry.io/inject-java: "false"
    instrumentation.opentelemetry.io/inject-nodejs: "false"
    instrumentation.opentelemetry.io/inject-dotnet: "false"
  image: "602401143452.dkr.ecr.${AWS_REGION}.amazonaws.com/eks/observability/cloudwatch-agent:1.300066.0b1367"
  config: '{"agent":{"region":"${AWS_REGION}"},"logs":{"metrics_collected":{"application_signals":{"hosted_in":"${CLUSTER_NAME}"}}},"traces":{"traces_collected":{"application_signals":{}}}}'
  env:
    - name: K8S_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: K8S_CLUSTER_NAME
      value: "${CLUSTER_NAME}"
    - name: RUN_WITH_IRSA
      value: "True"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
---
# Namespace-scoped Instrumentation CR — overrides the global cluster CR
# so Fargate pods send OTLP to the local CloudWatch Agent Deployment (adot-collector service).
# Only exporter.endpoint is overridden; the operator injects App Signals env vars by default.
apiVersion: cloudwatch.aws.amazon.com/v1alpha1
kind: Instrumentation
metadata:
  name: appsignals-fargate
  namespace: eks-fargate-appsignals
spec:
  exporter:
    endpoint: http://adot-collector:4316
  sampler:
    type: parentbased_traceidratio
    argument: "1"
  env:
    - name: OTEL_LOGS_EXPORTER
      value: "none"
    - name: OTEL_METRICS_EXPORTER
      value: "none"
    - name: OTEL_AWS_APPLICATION_SIGNALS_ENABLED
      value: "true"
    - name: OTEL_PYTHON_DISTRO
      value: "aws_distro"
    - name: OTEL_PYTHON_CONFIGURATOR
      value: "aws_configurator"
    - name: OTEL_AWS_APPLICATION_SIGNALS_EXPORTER_ENDPOINT
      value: "http://adot-collector:4316/v1/metrics"
    - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
      value: "http://adot-collector:4316/v1/traces"
