---
# -------------------------------------------------------
# EKS on EC2 + CloudWatch Application Signals
# -------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: eks-ec2-appsignals
  labels:
    monitoring: "enabled"
    environment: "eks-ec2-appsignals"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-signals-sa
  namespace: eks-ec2-appsignals
  annotations:
    eks.amazonaws.com/role-arn: "${APP_SIGNALS_EC2_ROLE_ARN}"
---
# -------------------------------------------------------
# EKS on Fargate + CloudWatch Application Signals
# -------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: eks-fargate-appsignals
  labels:
    monitoring: "enabled"
    environment: "eks-fargate-appsignals"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-signals-sa
  namespace: eks-fargate-appsignals
  annotations:
    eks.amazonaws.com/role-arn: "${APP_SIGNALS_FARGATE_ROLE_ARN}"
---
# -------------------------------------------------------
# EKS on EC2 + New Relic APM
# -------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: eks-ec2-newrelic
  labels:
    monitoring: "enabled"
    environment: "eks-ec2-newrelic"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: newrelic-app-sa
  namespace: eks-ec2-newrelic
---
# -------------------------------------------------------
# EKS on Fargate + New Relic APM (APM traces only)
# NOTE: Infrastructure Agent (DaemonSet) is not supported on Fargate.
#       Infra metrics, NR Logs Fluent Bit are unavailable in this environment.
# -------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: eks-fargate-newrelic
  labels:
    monitoring: "enabled"
    environment: "eks-fargate-newrelic"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: newrelic-fargate-sa
  namespace: eks-fargate-newrelic
