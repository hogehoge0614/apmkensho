---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-collector
  namespace: demo-ec2
  labels:
    app: metrics-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-collector
  template:
    metadata:
      labels:
        app: metrics-collector
        environment: demo-ec2
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: app-signals-sa
      nodeSelector:
        node-type: ec2
      containers:
        - name: metrics-collector
          image: ${ECR_REGISTRY}/obs-poc/metrics-collector:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "metrics-collector"
            - name: ENVIRONMENT
              value: "demo-ec2"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://cloudwatch-agent.amazon-cloudwatch:4316"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_SERVICE_NAME
              value: "metrics-collector"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=demo-ec2,k8s.namespace.name=demo-ec2"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-collector
  namespace: demo-ec2
  labels:
    app: metrics-collector
spec:
  type: ClusterIP
  selector:
    app: metrics-collector
  ports:
    - port: 8000
      targetPort: 8000
      name: http
