---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: demo-newrelic
  labels:
    app: inventory-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
        environment: demo-newrelic
      annotations:
        instrumentation.newrelic.com/inject-python: "newrelic"
    spec:
      serviceAccountName: newrelic-app-sa
      nodeSelector:
        node-type: ec2
      containers:
        - name: inventory-api
          image: ${ECR_REGISTRY}/obs-poc/inventory-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "inventory-api"
            - name: ENVIRONMENT
              value: "demo-newrelic"
            - name: EXTERNAL_URL
              value: "http://external-api-simulator:8000"
            - name: NEW_RELIC_APP_NAME
              value: "inventory-api"
            - name: NEW_RELIC_LABELS
              value: "environment:demo-newrelic;service:inventory-api"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: demo-newrelic
spec:
  type: ClusterIP
  selector:
    app: inventory-api
  ports:
    - port: 8000
      targetPort: 8000
      name: http
