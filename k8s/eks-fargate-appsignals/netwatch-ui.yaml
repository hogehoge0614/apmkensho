---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netwatch-ui
  namespace: eks-fargate-appsignals
  labels:
    app: netwatch-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netwatch-ui
  template:
    metadata:
      labels:
        app: netwatch-ui
        environment: eks-fargate-appsignals
      annotations:
        instrumentation.opentelemetry.io/inject-python: "appsignals-fargate"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: app-signals-sa
      containers:
        - name: netwatch-ui
          image: ${ECR_REGISTRY}/obs-poc/netwatch-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "netwatch-ui"
            - name: ENVIRONMENT
              value: "eks-fargate-appsignals"
            - name: NODE_TYPE
              value: "EKS on Fargate"
            - name: DEVICE_API_URL
              value: "http://device-api:8000"
            - name: ALERT_API_URL
              value: "http://alert-api:8000"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://adot-collector:4316"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_SERVICE_NAME
              value: "netwatch-ui"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=eks-fargate-appsignals,k8s.namespace.name=eks-fargate-appsignals"
            - name: CW_RUM_APP_MONITOR_ID
              value: "${CW_RUM_APP_MONITOR_ID}"
            - name: CW_RUM_IDENTITY_POOL_ID
              value: "${CW_RUM_IDENTITY_POOL_ID}"
            - name: CW_RUM_REGION
              value: "${CW_RUM_REGION}"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: netwatch-ui
  namespace: eks-fargate-appsignals
  labels:
    app: netwatch-ui
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "60"
spec:
  type: LoadBalancer
  selector:
    app: netwatch-ui
  ports:
    - port: 80
      targetPort: 8000
      name: http
