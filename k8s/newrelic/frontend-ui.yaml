---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-ui
  namespace: demo-newrelic
  labels:
    app: frontend-ui
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-ui
  template:
    metadata:
      labels:
        app: frontend-ui
        version: v1
        environment: demo-newrelic
      annotations:
        # New Relic APM Auto-Attach: k8s-agents-operator injects NR Python agent
        # as init container — no app code or image change needed
        instrumentation.newrelic.com/inject-python: "newrelic"
    spec:
      serviceAccountName: newrelic-app-sa
      nodeSelector:
        node-type: ec2
      containers:
        - name: frontend-ui
          image: ${ECR_REGISTRY}/obs-poc/frontend-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "frontend-ui"
            - name: ENVIRONMENT
              value: "demo-newrelic"
            - name: NODE_TYPE
              value: "EC2"
            - name: BFF_URL
              value: "http://backend-for-frontend:8000"
            # NEW_RELIC_APP_NAME and NEW_RELIC_LICENSE_KEY are injected
            # by the k8s-agents-operator via the Instrumentation CR
            - name: NEW_RELIC_APP_NAME
              value: "frontend-ui"
            - name: NEW_RELIC_LABELS
              value: "environment:demo-newrelic;service:frontend-ui"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-ui
  namespace: demo-newrelic
  labels:
    app: frontend-ui
spec:
  type: ClusterIP
  selector:
    app: frontend-ui
  ports:
    - port: 8000
      targetPort: 8000
      name: http
